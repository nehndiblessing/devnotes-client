<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>DevNotes</title>

  <link
    rel="stylesheet"
    href="style.css"
  />
</head>

<body>

  <div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar">

      <button
        class="theme-toggle"
        type="button"
      >
        Toggle Theme
      </button>

      <h1 class="app-title">
        DevNotes
      </h1>

      <button
        class="new-note-btn"
        type="button"
      >
        + New Note
      </button>

      <!-- Note Form -->
      <form class="note-form">

        <div class="form-group">
          <label for="titleInput">
            Title
          </label>

          <input
            type="text"
            id="titleInput"
            placeholder="Note title"
            required
          />
        </div>

        <div class="form-group">
          <label for="contentInput">
            Content
          </label>

          <textarea
            id="contentInput"
            placeholder="Write your note..."
            required
          ></textarea>
        </div>

        <!-- Preview -->
        <div class="preview-box">
          <h3>Live Preview</h3>

          <div class="preview-content">
            Start typing to preview...
          </div>
        </div>

        <button type="submit">
          Add Note
        </button>

      </form>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

      <header class="topbar">
        <input
          type="text"
          class="search-input"
          placeholder="Search notes..."
        />
      </header>

      <!-- Loading -->
      <div class="loading-state hidden">
        Loading notes...
      </div>

      <!-- Stats -->
      <section class="stats-section">

        <div class="stat-card">
          <h3>Total Notes</h3>
          <p id="totalNotes">0</p>
        </div>

        <div class="stat-card">
          <h3>Total Characters</h3>
          <p id="totalCharacters">0</p>
        </div>

      </section>

      <!-- Notes -->
      <section
        class="notes-grid"
        id="notesGrid"
      ></section>

    </main>

  </div>

  <script src="script.js"></script>

</body>

</html>
